
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваше изображение</title>
    <style>
        /* Сброс стилей и база */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
        }

        /* Карточка с изображением */
        .card {
            max-width: 820px;
            width: 100%;
            background: #14141e;
            border-radius: 32px;
            padding: 20px 20px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Контейнер для картинки */
        .image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #1a1a2e;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: filter 0.3s;
            filter: brightness(1.02) saturate(1.1);
        }

        .image-wrapper:hover img {
            filter: brightness(1.1) saturate(1.2);
        }

        /* Подпись под картинкой */
        .caption {
            margin-top: 18px;
            text-align: center;
            color: #b0b0d0;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            border-top: 1px solid #2a2a3e;
            padding-top: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .caption span {
            background: #1f1f30;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #8f8fb0;
            border: 1px solid #2d2d44;
        }

        .caption a {
            color: #a6a6d9;
            text-decoration: none;
            border-bottom: 1px dashed #3a3a5a;
            transition: color 0.2s, border-color 0.2s;
        }

        .caption a:hover {
            color: #d0d0ff;
            border-bottom-color: #7a7aaa;
        }

        /* Небольшая адаптивность */
        @media (max-width: 480px) {
            .card {
                padding: 12px 12px 18px;
                border-radius: 24px;
            }
            .caption {
                font-size: 0.8rem;
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="image-wrapper">
            <img 
                src="https://github.com/TimFly18/timfly18.github.io/blob/master/image%20(1).webp?raw=true" 
                alt="Изображение с GitHub"
                loading="lazy"
            >
        </div>
        <div class="caption">
            <span>🖼️</span>
            <span>Ваше изображение</span>
            <span>•</span>
            <a href="#" onclick="alert('Привет! Это ваше изображение с GitHub 😊')">✨ посмотреть</a>
        </div>
    </div>
</body>
</html>
