<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анастасия</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ----- общие сбросы и фон ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            padding: 20px;
            transition: background 0.5s, color 0.5s;
            position: relative;
            overflow: hidden;
        }

        /* Светлая тема (по умолчанию) */
        body.light {
            background: linear-gradient(145deg, #c8e7f0 0%, #d4f0f0 40%, #fce4ec 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease-in-out infinite alternate;
        }

        /* Тёмная тема */
        body.dark {
            background: linear-gradient(145deg, #0f1a24 0%, #1a1a2e 40%, #2d1b2e 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 30%; }
            100% { background-position: 100% 70%; }
        }

        /* ===== ИНТЕРАКТИВНЫЙ ФОН С РЯБЬЮ ===== */
        #rippleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== СТЕКЛЯННЫЕ ПУЗЫРЬКИ ===== */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            opacity: 0.15;
            animation: rise linear infinite;
            pointer-events: none;
        }

        body.light .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(100, 200, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.dark .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(100, 200, 255, 0.2), rgba(50, 100, 150, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.15;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-110vh) translateX(50px) scale(0.5);
                opacity: 0;
            }
        }

        /* ----- главный контейнер (стекло) ----- */
        .glass-wrapper {
            max-width: 950px;
            width: 100%;
            padding: 30px 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 20px 50px rgba(0, 40, 60, 0.15),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
            perspective: 1000px;
        }

        body.dark .glass-wrapper {
            background: rgba(20, 30, 40, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Декоративные элементы (капли) */
        .glass-wrapper::before,
        .glass-wrapper::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .glass-wrapper::before {
            width: 150px;
            height: 150px;
            top: -30px;
            right: -20px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 220, 240, 0.3), rgba(180, 230, 240, 0.05));
        }

        .glass-wrapper::after {
            width: 200px;
            height: 200px;
            bottom: -60px;
            left: -40px;
            background: radial-gradient(circle at 70% 70%, rgba(160, 230, 240, 0.2), rgba(255, 200, 220, 0.05));
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ: ДАТА СЛЕВА, КНОПКА ТЕМЫ СПРАВА ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 8px 5px;
            position: relative;
            z-index: 2;
        }

        .date-display {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1d4b5e;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark .date-display {
            color: #b3dff0;
            background: rgba(20, 30, 40, 0.3);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .date-display .icon {
            font-size: 1.2rem;
        }

        /* Кнопка переключения темы (справа) */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 10px 16px;
            color: #1e3b4a;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        body.dark .theme-toggle {
            color: #e0f0ff;
            background: rgba(30, 50, 70, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* ===== 3D-ЭФФЕКТ ДЛЯ КОНТЕЙНЕРА ===== */
        .glass-wrapper.tilt {
            transition: transform 0.1s ease-out;
        }

        /* ----- сетка с блоками ----- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 22px;
            justify-content: center;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        /* ===== КАРТОЧКИ С АНИМИРОВАННЫМ ГРАДИЕНТОМ ===== */
        .glass-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            border-radius: 40px 12px 40px 12px;
            box-shadow: 0 8px 25px rgba(0, 30, 40, 0.08),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            text-decoration: none;
            color: #1e3b4a;
            font-weight: 600;
            text-align: center;
            min-height: 150px;
            transform: scale(1);
            word-break: break-word;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            /* Анимированный градиент */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(200, 240, 255, 0.15), rgba(255, 200, 220, 0.15));
            background-size: 300% 300%;
            animation: cardGradient 6s ease-in-out infinite alternate, fadeInUp 0.6s ease forwards;
        }

        body.dark .glass-card {
            color: #e0f0ff;
            background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2));
            background-size: 300% 300%;
            animation: cardGradientDark 6s ease-in-out infinite alternate, fadeInUp 0.6s ease forwards;
        }

        @keyframes cardGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes cardGradientDark {
            0% { background-position: 0% 50%; background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2)); }
            50% { background-position: 100% 50%; background: linear-gradient(135deg, rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2), rgba(30, 50, 70, 0.3)); }
            100% { background-position: 0% 50%; background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2)); }
        }

        /* Анимация появления с задержкой (переопределяем, чтобы не конфликтовать) */
        .glass-card:nth-child(1) { animation-delay: 0.05s; }
        .glass-card:nth-child(2) { animation-delay: 0.1s; }
        .glass-card:nth-child(3) { animation-delay: 0.15s; }
        .glass-card:nth-child(4) { animation-delay: 0.2s; }
        .glass-card:nth-child(5) { animation-delay: 0.25s; }
        .glass-card:nth-child(6) { animation-delay: 0.3s; }
        .glass-card:nth-child(7) { animation-delay: 0.35s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Градиентная обводка */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 40px 12px 40px 12px;
            padding: 2px;
            background: linear-gradient(135deg, #80deea, #f8bbd0, #b3e5fc);
            background-size: 300% 300%;
            animation: borderGradient 4s ease-in-out infinite alternate;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        body.dark .glass-card::before {
            background: linear-gradient(135deg, #4dd0e1, #f48fb1, #4fc3f7);
            background-size: 300% 300%;
            animation: borderGradientDark 4s ease-in-out infinite alternate;
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes borderGradientDark {
            0% { background-position: 0% 50%; background: linear-gradient(135deg, #4dd0e1, #f48fb1, #4fc3f7); }
            100% { background-position: 100% 50%; background: linear-gradient(135deg, #f48fb1, #4fc3f7, #4dd0e1); }
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* Свечение при наведении */
        .glass-card:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.2),
                        0 0 80px rgba(255, 150, 200, 0.15),
                        0 18px 40px rgba(0, 60, 80, 0.15),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.4);
        }

        body.dark .glass-card:hover {
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.3),
                        0 0 80px rgba(255, 150, 200, 0.2),
                        0 18px 40px rgba(0, 0, 0, 0.4);
        }

        .glass-card:active {
            transform: scale(0.95);
        }

        /* Всплывающая подсказка (tooltip) */
        .glass-card::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
            transform: translateX(-50%) translateY(5px);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .glass-card:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ----- иконки и текст внутри блоков ----- */
        .card-icon {
            font-size: 2.6rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0, 30, 40, 0.1));
            transition: transform 0.3s;
        }

        .glass-card:hover .card-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .card-label {
            font-size: 1rem;
            letter-spacing: 0.4px;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            font-weight: 600;
            color: inherit;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }

        .glass-card:hover .card-label {
            background: rgba(255, 255, 255, 0.5);
        }

        body.dark .card-label {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark .glass-card:hover .card-label {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Индикатор онлайн */
        .online-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* ----- заголовок ----- */
        .header-title {
            font-size: 2.1rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: #1d4b5e;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 100px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            transition: all 0.3s;
        }

        body.dark .header-title {
            color: #b3dff0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .header-wrap {
            text-align: center;
        }

        /* ===== СЛУЧАЙНАЯ ЦИТАТА ===== */
        .quote-container {
            text-align: center;
            margin: 5px 0 20px 0;
            padding: 8px 20px;
            font-size: 1rem;
            font-style: italic;
            color: #2d5a6b;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        body.dark .quote-container {
            color: #8ab3c4;
            background: rgba(20, 30, 40, 0.2);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .quote-container .quote-icon {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .quote-container .quote-text {
            font-weight: 400;
        }

        .quote-container .quote-author {
            font-weight: 600;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        /* Подпись внизу */
        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 1.1rem;
            color: #2d5a6b;
            opacity: 0.8;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            position: relative;
            z-index: 1;
            font-weight: 600;
            transition: all 0.3s;
        }

        .footer-text:hover {
            opacity: 1;
            transform: scale(1.02);
        }

        body.dark .footer-text {
            color: #8ab3c4;
        }

        /* ----- адаптивность ----- */
        @media (max-width: 600px) {
            .glass-wrapper {
                padding: 20px 15px;
                border-radius: 40px 10px 40px 10px;
            }
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 16px;
            }
            .glass-card {
                min-height: 120px;
                padding: 16px 8px;
            }
            .card-icon {
                font-size: 2.2rem;
            }
            .header-title {
                font-size: 1.6rem;
                padding: 8px 16px;
            }
            .glass-card::after {
                display: none;
            }
            .theme-toggle {
                padding: 8px 14px;
                font-size: 1.2rem;
            }
            .footer-text {
                font-size: 0.9rem;
            }
            .date-display {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .date-display .icon {
                font-size: 1rem;
            }
            .top-bar {
                margin-bottom: 12px;
            }
            .quote-container {
                font-size: 0.85rem;
                padding: 6px 14px;
                min-height: 32px;
            }
        }
    </style>
</head>
<body class="light">

    <canvas id="rippleCanvas"></canvas>

    <!-- ===== СТЕКЛЯННЫЕ ПУЗЫРЬКИ ===== -->

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="glass-wrapper" id="glassWrapper">

        <!-- Верхняя панель: дата слева, кнопка темы справа -->
        <div class="top-bar">
            <div class="date-display">
                <span class="icon">📅</span>
                <span id="currentDate">Загрузка...</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
                🌙
            </button>
        </div>

        <div class="header-wrap">
            <div class="header-title">✦ привет ✦</div>
        </div>

        <!-- ===== СЛУЧАЙНАЯ ЦИТАТА ===== -->

        <div class="footer-text">

    </div>

    <!-- Библиотека для частиц -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        // =============================================
        // 1. ИНТЕРАКТИВНЫЙ ФОН С РЯБЬЮ
        // =============================================
        (function() {
            const canvas = document.getElementById('rippleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let ripples = [];
            const MAX_RIPPLES = 15;
            let mouseX = -1000, mouseY = -1000;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Ripple {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 0;
                    this.maxRadius = Math.max(width, height) * 0.6;
                    this.speed = 2 + Math.random() * 3;
                    this.opacity = 0.6;
                    this.color = `hsla(${190 + Math.random() * 30}, 70%, 70%, `;
                }

                update() {
                    this.radius += this.speed;
                    this.opacity = 0.6 * (1 - this.radius / this.maxRadius);
                    return this.radius < this.maxRadius && this.opacity > 0.01;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color + this.opacity + ')';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Внутреннее свечение
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.radius
                    );
                    gradient.addColorStop(0, this.color + (this.opacity * 0.2) + ')');
                    gradient.addColorStop(1, this.color + '0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            function addRipple(x, y) {
                if (ripples.length >= MAX_RIPPLES) {
                    ripples.shift();
                }
                ripples.push(new Ripple(x, y));
            }

            function animateRipples() {
                ctx.clearRect(0, 0, width, height);

                // Автоматические ряби от движения мыши
                if (mouseX > 0 && mouseY > 0) {
                    // Добавляем рябь от мыши с задержкой
                }

                ripples = ripples.filter(ripple => {
                    ripple.update();
                    ripple.draw();
                    return ripple.radius < ripple.maxRadius && ripple.opacity > 0.01;
                });

                // Добавляем случайные ряби для красоты
                if (Math.random() < 0.02) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    addRipple(x, y);
                }

                requestAnimationFrame(animateRipples);
            }

            // События мыши
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (Math.random() < 0.1) {
                    addRipple(e.clientX, e.clientY);
                }
            });

            document.addEventListener('click', (e) => {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        addRipple(
                            e.clientX + (Math.random() - 0.5) * 40,
                            e.clientY + (Math.random() - 0.5) * 40
                        );
                    }, i * 100);
                }
            });

            // Добавляем начальные ряби
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    addRipple(
                        Math.random() * width,
                        Math.random() * height
                    );
                }, i * 300);
            }

            animateRipples();
        })();

        // =============================================
        // 2. СТЕКЛЯННЫЕ ПУЗЫРЬКИ
        // =============================================
        (function() {
            const container = document.getElementById('bubblesContainer');
            const bubbleCount = 20;

            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = 20 + Math.random() * 60;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = 15 + Math.random() * 25 + 's';
                bubble.style.animationDelay = Math.random() * 20 + 's';
                bubble.style.opacity = 0.05 + Math.random() * 0.15;
                container.appendChild(bubble);
            }
        })();

        // =============================================
        // 3. 3D-ЭФФЕКТ ПРИ НАКЛОНЕ МЫШИ
        // =============================================
        (function() {
            const wrapper = document.getElementById('glassWrapper');
            let isHovering = false;

            wrapper.addEventListener('mouseenter', () => {
                isHovering = true;
            });

            wrapper.addEventListener('mouseleave', () => {
                isHovering = false;
                wrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
            });

            wrapper.addEventListener('mousemove', (e) => {
                if (!isHovering) return;
                const rect = wrapper.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                const rotateX = -y * 8;
                const rotateY = x * 8;
                wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
        })();

        function updateDate() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                timeZone: 'Europe/Moscow'
            };
            const dateString = now.toLocaleDateString('ru-RU', options);
            document.getElementById('currentDate').textContent = dateString;
        }
        updateDate();

        setInterval(showRandomQuote, 15000);

        // =============================================
        // 6. ПЕРЕКЛЮЧЕНИЕ ТЕМЫ
        // =============================================
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // ----- Загрузка сохранённой темы -----
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // =============================================

        // =============================================
        if ('vibrate' in navigator) {
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('touchstart', () => {
                    navigator.vibrate(10);
                });
            });
