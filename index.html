<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Визитка | Жидкое стекло</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ----- общие сбросы и фон ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            padding: 12px;
            transition: background 0.5s, color 0.5s;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Светлая тема (по умолчанию) */
        body.light {
            background: linear-gradient(145deg, #c8e7f0 0%, #d4f0f0 40%, #fce4ec 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease-in-out infinite alternate;
        }

        /* Тёмная тема */
        body.dark {
            background: linear-gradient(145deg, #0f1a24 0%, #1a1a2e 40%, #2d1b2e 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 30%; }
            100% { background-position: 100% 70%; }
        }

        /* ===== ИНТЕРАКТИВНЫЙ ФОН С РЯБЬЮ ===== */
        #rippleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            touch-action: none;
        }

        /* ===== СТЕКЛЯННЫЕ ПУЗЫРЬКИ ===== */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            opacity: 0.15;
            animation: rise linear infinite;
            pointer-events: none;
            will-change: transform;
        }

        body.light .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(100, 200, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.dark .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(100, 200, 255, 0.2), rgba(50, 100, 150, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.15;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-110vh) translateX(50px) scale(0.5);
                opacity: 0;
            }
        }

        /* ----- главный контейнер (стекло) ----- */
        .glass-wrapper {
            max-width: 950px;
            width: 100%;
            padding: 20px 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 40px 12px 40px 12px;
            box-shadow: 0 20px 50px rgba(0, 40, 60, 0.15),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
            perspective: 1000px;
        }

        body.dark .glass-wrapper {
            background: rgba(20, 30, 40, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Декоративные элементы (капли) */
        .glass-wrapper::before,
        .glass-wrapper::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 0;
        }

        .glass-wrapper::before {
            width: 120px;
            height: 120px;
            top: -20px;
            right: -15px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 220, 240, 0.3), rgba(180, 230, 240, 0.05));
        }

        .glass-wrapper::after {
            width: 160px;
            height: 160px;
            bottom: -40px;
            left: -30px;
            background: radial-gradient(circle at 70% 70%, rgba(160, 230, 240, 0.2), rgba(255, 200, 220, 0.05));
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ: ДАТА СЛЕВА, КНОПКА ТЕМЫ СПРАВА ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 4px 2px;
            position: relative;
            z-index: 2;
            gap: 10px;
        }

        .date-display {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1d4b5e;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        body.dark .date-display {
            color: #b3dff0;
            background: rgba(20, 30, 40, 0.3);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .date-display .icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        #currentDate {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Кнопка переключения темы (справа) */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 8px 14px;
            color: #1e3b4a;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle:active {
            transform: scale(0.92);
        }

        body.dark .theme-toggle {
            color: #e0f0ff;
            background: rgba(30, 50, 70, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Отключаем hover на мобилках */
        @media (hover: none) {
            .theme-toggle:hover {
                transform: none;
            }
        }

        /* ===== 3D-ЭФФЕКТ ТОЛЬКО ДЛЯ ДЕСКТОПА ===== */
        @media (hover: hover) and (pointer: fine) {
            .glass-wrapper.tilt {
                transition: transform 0.1s ease-out;
            }
        }

        /* ----- сетка с блоками ----- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* ===== КАРТОЧКИ С АНИМИРОВАННЫМ ГРАДИЕНТОМ ===== */
        .glass-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 10px;
            border-radius: 32px 10px 32px 10px;
            box-shadow: 0 8px 25px rgba(0, 30, 40, 0.08),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            text-decoration: none;
            color: #1e3b4a;
            font-weight: 600;
            text-align: center;
            min-height: 120px;
            transform: scale(1);
            word-break: break-word;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(200, 240, 255, 0.15), rgba(255, 200, 220, 0.15));
            background-size: 300% 300%;
            animation: cardGradient 6s ease-in-out infinite alternate, fadeInUp 0.6s ease forwards;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body.dark .glass-card {
            color: #e0f0ff;
            background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2));
            background-size: 300% 300%;
            animation: cardGradientDark 6s ease-in-out infinite alternate, fadeInUp 0.6s ease forwards;
        }

        @keyframes cardGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes cardGradientDark {
            0% { background-position: 0% 50%; background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2)); }
            50% { background-position: 100% 50%; background: linear-gradient(135deg, rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2), rgba(30, 50, 70, 0.3)); }
            100% { background-position: 0% 50%; background: linear-gradient(135deg, rgba(30, 50, 70, 0.3), rgba(20, 60, 80, 0.2), rgba(70, 30, 50, 0.2)); }
        }

        .glass-card:nth-child(1) { animation-delay: 0.05s; }
        .glass-card:nth-child(2) { animation-delay: 0.1s; }
        .glass-card:nth-child(3) { animation-delay: 0.15s; }
        .glass-card:nth-child(4) { animation-delay: 0.2s; }
        .glass-card:nth-child(5) { animation-delay: 0.25s; }
        .glass-card:nth-child(6) { animation-delay: 0.3s; }
        .glass-card:nth-child(7) { animation-delay: 0.35s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Градиентная обводка */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 32px 10px 32px 10px;
            padding: 2px;
            background: linear-gradient(135deg, #80deea, #f8bbd0, #b3e5fc);
            background-size: 300% 300%;
            animation: borderGradient 4s ease-in-out infinite alternate;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        body.dark .glass-card::before {
            background: linear-gradient(135deg, #4dd0e1, #f48fb1, #4fc3f7);
            background-size: 300% 300%;
            animation: borderGradientDark 4s ease-in-out infinite alternate;
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes borderGradientDark {
            0% { background-position: 0% 50%; background: linear-gradient(135deg, #4dd0e1, #f48fb1, #4fc3f7); }
            100% { background-position: 100% 50%; background: linear-gradient(135deg, #f48fb1, #4fc3f7, #4dd0e1); }
        }

        .glass-card:active {
            transform: scale(0.95) !important;
        }

        /* Отключаем hover-эффекты на мобилках */
        @media (hover: hover) and (pointer: fine) {
            .glass-card:hover {
                transform: scale(1.05) translateY(-8px);
                box-shadow: 0 0 40px rgba(100, 200, 255, 0.2),
                            0 0 80px rgba(255, 150, 200, 0.15),
                            0 18px 40px rgba(0, 60, 80, 0.15),
                            inset 0 0 0 1px rgba(255, 255, 255, 0.7);
                border-color: rgba(255, 255, 255, 0.4);
            }

            body.dark .glass-card:hover {
                box-shadow: 0 0 40px rgba(100, 200, 255, 0.3),
                            0 0 80px rgba(255, 150, 200, 0.2),
                            0 18px 40px rgba(0, 0, 0, 0.4);
            }

            .glass-card:hover .card-icon {
                transform: scale(1.1) rotate(-5deg);
            }

            .glass-card:hover .card-label {
                background: rgba(255, 255, 255, 0.5);
            }

            body.dark .glass-card:hover .card-label {
                background: rgba(255, 255, 255, 0.2);
            }

            .glass-card:hover::after {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Всплывающая подсказка (tooltip) - скрываем на мобилках */
        .glass-card::after {
            display: none;
        }

        @media (hover: hover) and (pointer: fine) {
            .glass-card::after {
                display: block;
                content: attr(data-tooltip);
                position: absolute;
                bottom: calc(100% + 10px);
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 0.75rem;
                opacity: 0;
                transition: opacity 0.3s, transform 0.3s;
                white-space: nowrap;
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                pointer-events: none;
                transform: translateX(-50%) translateY(5px);
                z-index: 100;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }
        }

        /* ----- иконки и текст внутри блоков ----- */
        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0, 30, 40, 0.1));
            transition: transform 0.3s;
        }

        .card-label {
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.3);
            padding: 5px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            font-weight: 600;
            color: inherit;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
            font-size: clamp(0.7rem, 2.5vw, 0.95rem);
        }

        body.dark .card-label {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Индикатор онлайн */
        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* ----- заголовок ----- */
        .header-title {
            font-size: clamp(1.5rem, 6vw, 2.1rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #1d4b5e;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            padding: 8px 18px;
            border-radius: 100px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            transition: all 0.3s;
        }

        body.dark .header-title {
            color: #b3dff0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .header-wrap {
            text-align: center;
        }

        /* ===== СЛУЧАЙНАЯ ЦИТАТА ===== */
        .quote-container {
            text-align: center;
            margin: 4px 0 16px 0;
            padding: 6px 16px;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-style: italic;
            color: #2d5a6b;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        body.dark .quote-container {
            color: #8ab3c4;
            background: rgba(20, 30, 40, 0.2);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .quote-container .quote-icon {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            opacity: 0.6;
            flex-shrink: 0;
        }

        .quote-container .quote-text {
            font-weight: 400;
            line-height: 1.4;
        }

        .quote-container .quote-author {
            font-weight: 600;
            opacity: 0.7;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            flex-shrink: 0;
        }

        /* Подпись внизу */
        .footer-text {
            text-align: center;
            margin-top: 22px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: #2d5a6b;
            opacity: 0.8;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            position: relative;
            z-index: 1;
            font-weight: 600;
            transition: all 0.3s;
        }

        body.dark .footer-text {
            color: #8ab3c4;
        }

        /* ===== АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ ===== */

        /* Маленькие телефоны (до 480px) */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                align-items: flex-start;
                padding-top: 12px;
            }

            .glass-wrapper {
                padding: 14px 12px;
                border-radius: 30px 8px 30px 8px;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .glass-card {
                min-height: 100px;
                padding: 12px 6px;
                border-radius: 24px 8px 24px 8px;
            }

            .glass-card::before {
                border-radius: 24px 8px 24px 8px;
            }

            .card-icon {
                font-size: 1.8rem;
                margin-bottom: 4px;
            }

            .card-label {
                font-size: 0.7rem;
                padding: 4px 8px;
            }

            .date-display {
                font-size: 0.7rem;
                padding: 4px 10px;
            }

            .date-display .icon {
                font-size: 0.85rem;
            }

            .theme-toggle {
                padding: 6px 10px;
                font-size: 1rem;
            }

            .top-bar {
                margin-bottom: 10px;
                gap: 6px;
            }

            .header-title {
                font-size: 1.3rem;
                padding: 6px 14px;
                margin-bottom: 4px;
            }

            .quote-container {
                font-size: 0.75rem;
                padding: 4px 10px;
                min-height: 28px;
                margin: 2px 0 10px 0;
                gap: 4px;
            }

            .quote-container .quote-icon {
                font-size: 0.8rem;
            }

            .quote-container .quote-author {
                font-size: 0.65rem;
            }

            .footer-text {
                font-size: 0.8rem;
                margin-top: 14px;
            }

            .online-indicator {
                width: 6px;
                height: 6px;
            }

            /* Скрываем декоративные капли */
            .glass-wrapper::before,
            .glass-wrapper::after {
                display: none;
            }
        }

        /* Телефоны среднего размера (481px - 768px) */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 12px;
            }

            .glass-wrapper {
                padding: 18px 14px;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }

            .glass-card {
                min-height: 110px;
                padding: 14px 8px;
            }

            .card-icon {
                font-size: 2rem;
            }

            .card-label {
                font-size: 0.8rem;
                padding: 4px 10px;
            }

            .date-display {
                font-size: 0.8rem;
                padding: 5px 12px;
            }

            .theme-toggle {
                padding: 7px 12px;
                font-size: 1.1rem;
            }
        }

        /* Планшеты (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Большие экраны (>1024px) */
        @media (min-width: 1025px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }

            .glass-card {
                min-height: 150px;
                padding: 20px 12px;
            }

            .card-icon {
                font-size: 2.6rem;
            }

            .card-label {
                font-size: 1rem;
                padding: 6px 14px;
            }
        }

        /* Альбомная ориентация на телефонах */
        @media (max-width: 768px) and (orientation: landscape) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .glass-card {
                min-height: 80px;
                padding: 10px 6px;
            }

            .card-icon {
                font-size: 1.5rem;
                margin-bottom: 2px;
            }

            .card-label {
                font-size: 0.65rem;
                padding: 3px 6px;
            }

            .glass-wrapper {
                padding: 12px 10px;
            }

            .header-title {
                font-size: 1.2rem;
                padding: 4px 12px;
                margin-bottom: 2px;
            }

            .quote-container {
                font-size: 0.7rem;
                padding: 3px 8px;
                min-height: 22px;
                margin: 2px 0 8px 0;
            }

            .top-bar {
                margin-bottom: 6px;
            }

            .date-display {
                font-size: 0.65rem;
                padding: 3px 8px;
            }

            .theme-toggle {
                padding: 4px 8px;
                font-size: 0.9rem;
            }

            .footer-text {
                font-size: 0.7rem;
                margin-top: 8px;
            }
        }

        /* Отключаем анимации на слабых устройствах */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Убираем скролл на мобилках если контент помещается */
        @media (max-width: 480px) {
            .glass-wrapper {
                overflow: visible;
            }
        }
    </style>
</head>
<body class="light">

    <!-- ===== ИНТЕРАКТИВНЫЙ ФОН С РЯБЬЮ ===== -->
    <canvas id="rippleCanvas"></canvas>

    <!-- ===== СТЕКЛЯННЫЕ ПУЗЫРЬКИ ===== -->
    <div class="bubbles-container" id="bubblesContainer"></div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="glass-wrapper" id="glassWrapper">

        <!-- Верхняя панель: дата слева, кнопка темы справа -->
        <div class="top-bar">
            <div class="date-display">
                <span class="icon">📅</span>
                <span id="currentDate">Загрузка...</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Переключить тему">
                🌙
            </button>
        </div>

        <div class="header-wrap">
            <div class="header-title">✦ привет ✦</div>
        </div>

        <!-- ===== СЛУЧАЙНАЯ ЦИТАТА ===== -->
        <div class="quote-container" id="quoteContainer">
            <span class="quote-icon">💭</span>
            <span class="quote-text" id="quoteText">Загрузка цитаты...</span>
            <span class="quote-author" id="quoteAuthor"></span>
        </div>

        <div class="grid">
            <!-- 1. Твич -->
            <a href="https://twitch.tv/ваш_канал" target="_blank" class="glass-card" data-tooltip="Перейти на Twitch">
                <div class="card-icon">🎮</div>
                <span class="card-label">
                    Мой Twitch
                    <span class="online-indicator"></span>
                </span>
            </a>

            <!-- 2. Группа (основная) -->
            <a href="https://vk.com/ваша_группа" target="_blank" class="glass-card" data-tooltip="Перейти в группу">
                <div class="card-icon">📢</div>
                <span class="card-label">Моя группа</span>
            </a>

            <!-- 3. Почта -->
            <a href="mailto:ваша@почта.ru" target="_blank" class="glass-card" data-tooltip="Написать письмо">
                <div class="card-icon">✉️</div>
                <span class="card-label">Почта</span>
            </a>

            <!-- 4. Донат -->
            <a href="https://www.donationalerts.com/r/ваш_ник" target="_blank" class="glass-card" data-tooltip="Поддержать донатом">
                <div class="card-icon">💎</div>
                <span class="card-label">Донат</span>
            </a>

            <!-- 5. Стим -->
            <a href="https://steamcommunity.com/id/ваш_айди" target="_blank" class="glass-card" data-tooltip="Перейти в Steam">
                <div class="card-icon">🕹️</div>
                <span class="card-label">Steam</span>
            </a>

            <!-- 6. Запасная группа -->
            <a href="https://vk.com/запасная_группа" target="_blank" class="glass-card" data-tooltip="Запасной канал связи">
                <div class="card-icon">🌀</div>
                <span class="card-label">Запасная группа</span>
            </a>

            <!-- 7. В разработке -->
            <a href="#" target="_blank" class="glass-card" data-tooltip="Скоро здесь что-то появится" style="opacity: 0.9;">
                <div class="card-icon">⚙️</div>
                <span class="card-label">В разработке</span>
            </a>
        </div>

        <div class="footer-text">
            ✦ Добро Пожаловать ✦
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        // =============================================
        // 1. ИНТЕРАКТИВНЫЙ ФОН С РЯБЬЮ (адаптирован для мобилок)
        // =============================================
        (function() {
            const canvas = document.getElementById('rippleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let ripples = [];
            const MAX_RIPPLES = 12;
            let mouseX = -1000, mouseY = -1000;
            let isMobile = window.innerWidth < 768;
            let touchActive = false;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                isMobile = window.innerWidth < 768;
            }
            window.addEventListener('resize', resize);
            resize();

            class Ripple {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 0;
                    this.maxRadius = Math.max(width, height) * 0.5;
                    this.speed = isMobile ? 1.5 + Math.random() * 2 : 2 + Math.random() * 3;
                    this.opacity = isMobile ? 0.4 : 0.6;
                    this.color = `hsla(${190 + Math.random() * 30}, 70%, 70%, `;
                }

                update() {
                    this.radius += this.speed;
                    this.opacity = (isMobile ? 0.4 : 0.6) * (1 - this.radius / this.maxRadius);
                    return this.radius < this.maxRadius && this.opacity > 0.01;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color + this.opacity + ')';
                    ctx.lineWidth = isMobile ? 1 : 2;
                    ctx.stroke();

                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.radius
                    );
                    gradient.addColorStop(0, this.color + (this.opacity * 0.15) + ')');
                    gradient.addColorStop(1, this.color + '0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }

            function addRipple(x, y) {
                if (ripples.length >= MAX_RIPPLES) {
                    ripples.shift();
                }
                ripples.push(new Ripple(x, y));
            }

            function animateRipples() {
                ctx.clearRect(0, 0, width, height);

                ripples = ripples.filter(ripple => {
                    ripple.update();
                    ripple.draw();
                    return ripple.radius < ripple.maxRadius && ripple.opacity > 0.01;
                });

                // На мобилках реже добавляем случайные ряби
                if (Math.random() < (isMobile ? 0.008 : 0.02)) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    addRipple(x, y);
                }

                requestAnimationFrame(animateRipples);
            }

            // События мыши (десктоп)
            document.addEventListener('mousemove', (e) => {
                if (isMobile) return;
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (Math.random() < 0.08) {
                    addRipple(e.clientX, e.clientY);
                }
            });

            document.addEventListener('click', (e) => {
                for (let i = 0; i < (isMobile ? 2 : 3); i++) {
                    setTimeout(() => {
                        addRipple(
                            e.clientX + (Math.random() - 0.5) * (isMobile ? 20 : 40),
                            e.clientY + (Math.random() - 0.5) * (isMobile ? 20 : 40)
                        );
                    }, i * (isMobile ? 150 : 100));
                }
            });

            // События касаний (мобилки)
            document.addEventListener('touchstart', (e) => {
                touchActive = true;
                const touch = e.touches[0];
                for (let i = 0; i < 2; i++) {
                    setTimeout(() => {
                        addRipple(
                            touch.clientX + (Math.random() - 0.5) * 30,
                            touch.clientY + (Math.random() - 0.5) * 30
                        );
                    }, i * 150);
                }
            });

            document.addEventListener('touchmove', (e) => {
                if (!touchActive) return;
                const touch = e.touches[0];
                if (Math.random() < 0.05) {
                    addRipple(touch.clientX, touch.clientY);
                }
            });

            document.addEventListener('touchend', () => {
                touchActive = false;
            });

            // Начальные ряби
            for (let i = 0; i < (isMobile ? 3 : 5); i++) {
                setTimeout(() => {
                    addRipple(
                        Math.random() * width,
                        Math.random() * height
                    );
                }, i * (isMobile ? 500 : 300));
            }

            animateRipples();
        })();

        // =============================================
        // 2. СТЕКЛЯННЫЕ ПУЗЫРЬКИ (адаптированы для мобилок)
        // =============================================
        (function() {
            const container = document.getElementById('bubblesContainer');
            const isMobile = window.innerWidth < 768;
            const bubbleCount = isMobile ? 12 : 20;

            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = isMobile ? 15 + Math.random() * 35 : 20 + Math.random() * 60;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = (isMobile ? 18 : 15) + Math.random() * (isMobile ? 20 : 25) + 's';
                bubble.style.animationDelay = Math.random() * (isMobile ? 15 : 20) + 's';
                bubble.style.opacity = (isMobile ? 0.03 : 0.05) + Math.random() * (isMobile ? 0.1 : 0.15);
                container.appendChild(bubble);
            }
        })();

        // =============================================
        // 3. 3D-ЭФФЕКТ (только для десктопа)
        // =============================================
        (function() {
            const wrapper = document.getElementById('glassWrapper');
            const isMobile = window.innerWidth < 768;
            let isHovering = false;

            if (!isMobile) {
                wrapper.addEventListener('mouseenter', () => {
                    isHovering = true;
                });

                wrapper.addEventListener('mouseleave', () => {
                    isHovering = false;
                    wrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
                });

                wrapper.addEventListener('mousemove', (e) => {
                    if (!isHovering) return;
                    const rect = wrapper.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    const rotateX = -y * 8;
                    const rotateY = x * 8;
                    wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });
            }
        })();

        // =============================================
        // 4. ОТОБРАЖЕНИЕ ТЕКУЩЕЙ ДАТЫ
        // =============================================
        function updateDate() {
            const now = new Date();
            const isMobile = window.innerWidth < 480;
            const options = { 
                weekday: isMobile ? 'short' : 'long',
                year: 'numeric', 
                month: isMobile ? 'short' : 'long',
                day: 'numeric',
                timeZone: 'Europe/Moscow'
            };
            const dateString = now.toLocaleDateString('ru-RU', options);
            document.getElementById('currentDate').textContent = dateString;
        }
        updateDate();

        // Обновляем дату при изменении ориентации
        window.addEventListener('resize', updateDate);

        // =============================================
        // 5. СЛУЧАЙНАЯ ЦИТАТА
        // =============================================
        const quotes = [
            { text: "Жизнь — это то, что происходит, пока вы строите планы.", author: "Джон Леннон" },
            { text: "Будьте тем изменением, которое хотите видеть в мире.", author: "Махатма Ганди" },
            { text: "Всё, что мы есть — это результат наших мыслей.", author: "Будда" },
            { text: "Сложнее всего начать действовать, всё остальное зависит только от упорства.", author: "Амелия Эрхарт" },
            { text: "Не бойтесь быть медленными, бойтесь останавливаться.", author: "Китайская пословица" },
            { text: "Мечты становятся реальностью, когда мысли превращаются в действия.", author: "Неизвестный" },
            { text: "Успех — это умение идти от неудачи к неудаче, не теряя энтузиазма.", author: "Уинстон Черчилль" },
            { text: "Единственный способ сделать что-то хорошо — это любить то, что делаешь.", author: "Стив Джобс" },
            { text: "Не ждите идеального момента, возьмите момент и сделайте его идеальным.", author: "Неизвестный" },
            { text: "Самая большая слава — не в том, чтобы никогда не падать, а в том, чтобы вставать каждый раз.", author: "Конфуций" },
            { text: "Ваше время ограничено, не тратьте его, проживая чужую жизнь.", author: "Стив Джобс" },
            { text: "Чтобы дойти до цели, нужно идти.", author: "Оноре де Бальзак" },
            { text: "Победа любит старание.", author: "Овидий" },
            { text: "Мы не можем изменить направление ветра, но мы можем настроить паруса.", author: "Джим Рон" }
        ];

        function showRandomQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteText').textContent = `"${quote.text}"`;
            document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
        }
        showRandomQuote();

        // Меняем цитату каждые 15 секунд
        setInterval(showRandomQuote, 15000);

        // =============================================
        // 6. ПЕРЕКЛЮЧЕНИЕ ТЕМЫ
        // =============================================
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // =============================================
        // 7. ВИБРАЦИЯ НА МОБИЛКАХ
        // =============================================
        if ('vibrate' in navigator && window.innerWidth < 768) {
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('touchstart', () => {
                    navigator.vibrate(8);
                });
            });
        }

        // =============================================
        // 8. КОНСОЛЬНОЕ ПРИВЕТСТВИЕ
        // =============================================
        console.log('%c✦ Привет! ✦', 'font-size: 20px; color: #80deea; font-weight: bold;');
        console.log('%cСайт-визитка в стиле "жидкое стекло"', 'font-size: 14px; color: #f8bbd0;');
        console.log('%cАдаптирован для мобильных устройств', 'font-size: 12px; color: #b3e5fc;');
    </script>

</body>
